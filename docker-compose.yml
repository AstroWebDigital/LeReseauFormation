version: "3.9"

services:
  db:
    build: ./db
    container_name: lr-db
    environment:
      POSTGRES_DB: lr_db
      POSTGRES_USER: lr_user
      POSTGRES_PASSWORD: lr_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lr_user -d lr_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: lr-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/lr_db
      SPRING_DATASOURCE_USERNAME: lr_user
      SPRING_DATASOURCE_PASSWORD: lr_password
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: lr-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
