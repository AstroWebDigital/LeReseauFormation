services:
  db:
    build: ./db
    container_name: lr-db
    env_file:
      - .env
    ports:
      - "15432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: lr-backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # URLs utilisées dans AuthController & EmailService
      APP_FRONTEND_BASE_URL: "http://localhost:3000"
      APP_PUBLIC_BASE_URL: "http://localhost:8080"

      SPRING_PROFILES_ACTIVE: docker

      # Config BDD (valeurs issues de .env)
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/${POSTGRES_DB}"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD}"

      # Sécurité & SMTP (toujours lus depuis .env)
      SECURITY_JWT_SECRET: "${SECURITY_JWT_SECRET}"
      SECURITY_JWT_EXPIRATION_MINUTES: "${SECURITY_JWT_EXPIRATION_MINUTES}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USERNAME: "${SMTP_USERNAME}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
    volumes:
      - ./uploads:/data/uploads
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: lr-frontend
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      # URL du backend vue par le frontend (Vite)
      VITE_API_URL: "http://localhost:8080"
      # Optionnel, si tu veux que le front connaisse aussi sa propre base URL
      VITE_APP_BASE_URL: "http://localhost:3000"
    ports:
      - "3000:3000"

volumes:
  db_data:
