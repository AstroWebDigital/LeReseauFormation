spring:
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 100MB

  datasource:
    url: jdbc:postgresql://db:5432/lr_db
    username: lr_user
    password: lr_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate     # ⚠️ surtout pas update en prod
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true # Obligatoire pour le port 587 (TLS)