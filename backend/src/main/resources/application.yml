spring:
  application:
    name: backend

  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 100MB

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
  upload-dir: ${UPLOAD_DIR:./uploads}
  jwt:
    secret: "T8zqP1hJjK2xM5nR9vU6bD3pE1sC7tF4wG8yH0aL2qN5rB8cZ6xV3mK1jP7uS9dT"
    expiration-ms: 3600000


  datasource:
    url: jdbc:postgresql://localhost:5432/lr_db
    username: lr_user
    password: lr_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
